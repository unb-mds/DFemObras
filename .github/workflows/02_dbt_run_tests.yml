name: 02 - dbt Build e Testes

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 

jobs:
  dbt_build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dbt e dependências
        run: |
          python -m pip install --upgrade pip
          pip install dbt-duckdb

      - name: Configurar dbt profiles.yml na máquina virtual
        run: |
          mkdir -p ~/.dbt
          cat << 'EOF' > ~/.dbt/profiles.yml
          df_em_obras_profile:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: "md:?motherduck_token={{ env_var('MOTHERDUCK_TOKEN') }}"
          EOF

      - name: Executar dbt deps e build
        run: |
          dbt deps --project-dir $GITHUB_WORKSPACE/data_eng/transform
          dbt build --project-dir $GITHUB_WORKSPACE/data_eng/transform
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}